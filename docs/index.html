<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>utils-where</title>
    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quasar@2.18.6/dist/quasar.prod.css" />
    <link
      id="markdown-css"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.26/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-router@4.6.4/dist/vue-router.global.prod.js"></script>
    <style>
      /* html.dark {
        .shiki,
        .shiki span {
          color: var(--shiki-dark) !important;
          background-color: var(--shiki-dark-bg) !important;
        }
      } */
      html {
        height: 100%;
        overscroll-behavior-y: contain;
      }
      body {
        height: 100%;
        margin: 0;
        font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', ' Hiragino Sans GB', 'SimSun', 'sans-serif';
      }

      #app {
        /* width: 70vw; */
        height: 100%;
        height: 100svh;
        /* margin: 0 auto; */
      }

      ul {
        list-style: none;
        padding-left: 0;
      }

      [v-cloak] {
        display: none;
      }

      .q-layout {
        height: 100%;
      }

      .q-drawer {
        position: fixed;
        padding: 2vh 0 2vh 20px;
      }
      .markdown-body {
        padding: 0 20px 20px;
      }
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.6s;
        animation-timing-function: ease-in;
        mix-blend-mode: normal;
      }
      ::view-transition-new(root) {
        animation-name: theme-expand;
      }
      @media screen and (min-width: 1200px) {
        .q-toolbar {
          padding: 0 2vw;
        }
        .q-drawer {
          margin-left: 5vw;
        }
        .markdown-body {
          /* width: 70vw; */
          margin: 0 10vw;
        }
      }
      @keyframes theme-expand {
        from {
          clip-path: circle(0% at 50% 50%);
        }
        to {
          clip-path: circle(150% at 50% 50%);
        }
      }
    </style>
  </head>

  <body>
    <div id="app" v-cloak>
      <q-layout view="hHh lpR fFf">
        <q-header elevated class="bg-primary text-white">
          <q-toolbar>
            <q-btn dense flat round icon="menu" @click="toggleLeftDrawer"></q-btn>
            <q-toolbar-title>utils where</q-toolbar-title>
            <q-btn flat round dense icon="settings_brightness" class="q-mr-md">
              <q-menu auto-close>
                <q-list>
                  <q-item clickable :active="theme === 'auto'" class="items-center" @click="changeTheme('auto')">
                    <q-icon name="brightness_medium" class="q-mr-xs"></q-icon>
                    <span class="vertical-middle">自动</span>
                  </q-item>
                  <q-item clickable :active="theme === 'light'" class="items-center" @click="changeTheme('light')">
                    <q-icon name="light_mode" class="q-mr-xs"></q-icon>
                    <span class="vertical-middle">日间</span>
                  </q-item>
                  <q-item clickable :active="theme === 'dark'" class="items-center" @click="changeTheme('dark')">
                    <q-icon name="dark_mode" class="q-mr-xs"></q-icon>
                    <span class="vertical-middle">夜间</span>
                  </q-item>
                </q-list>
              </q-menu>
            </q-btn>
            <q-btn flat round dense icon="translate">
              <q-menu auto-close>
                <q-list>
                  <q-item class="items-center">
                    <a href="index_zh-CN.html">简体中文</a>
                  </q-item>
                </q-list>
              </q-menu>
            </q-btn>
          </q-toolbar>
        </q-header>
        <q-drawer show-if-above v-model="leftDrawerOpen" side="left">
          <q-scroll-area class="fit">
            <q-list v-if="menus.length">
              <template v-for="(item, index) in menus" :key="index">
                <!-- 一级菜单 -->

                <q-item v-if="!item.sub" clickable :active="activeMenu === item.route" v-ripple @click="open(item)">
                  <q-item-section>{{ item.name }}</q-item-section>
                </q-item>

                <q-expansion-item v-else :model-value="true" :label="item.name">
                  <!-- 二级菜单 -->
                  <q-item
                    v-for="(subMenu, subMenuIndex) in item.sub"
                    :key="subMenuIndex"
                    clickable
                    :active="activeMenu === subMenu.name"
                    v-ripple
                    @click="open(subMenu)"
                  >
                    <q-item-section>{{ subMenu.name }}</q-item-section>
                  </q-item>
                </q-expansion-item>
              </template>
            </q-list>
          </q-scroll-area>
        </q-drawer>

        <q-page-container>
          <main class="markdown-body">
            <router-view v-slot="{ Component, route }">
              <keep-alive>
                <component v-if="route.name" :is="Component" :key="route.name"></component>
                <!-- :content="route.meta.content" -->
              </keep-alive>
            </router-view>
          </main>
        </q-page-container>
      </q-layout>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quasar@2.18.6/dist/quasar.umd.prod.js"></script>
    <script>
      if (document.startViewTransition === undefined) document.startViewTransition = (callback) => callback();
      let appTheme = localStorage.theme || 'auto';
      const matchDark = window.matchMedia('(prefers-color-scheme: dark)');
      const setTheme = (theme, noTransition) => {
        let goDark;
        const isDark = document.documentElement.classList.contains('dark');
        if (theme === 'auto') {
          // 跟随浏览器
          goDark = matchDark.matches;
        } else if (theme === 'dark') {
          goDark = true;
        } else if (theme === 'light') {
          goDark = false;
        }
        if ((isDark && !goDark) || (goDark && !isDark)) {
          const $markdownCss = document.getElementById('markdown-css');
          const toggleTheme = () => {
            $markdownCss.href = goDark
              ? $markdownCss.href.replace('github-markdown.min.css', 'github-markdown-dark.min.css')
              : $markdownCss.href.replace('github-markdown-dark.min.css', 'github-markdown.min.css');
            document.documentElement.classList.toggle('dark', goDark);
            Quasar.Dark.set(goDark);
          };
          !noTransition && document.startViewTransition
            ? setTimeout(() => document.startViewTransition(toggleTheme), 250)
            : toggleTheme();
        }
        setTimeout(() => {
          localStorage.theme = appTheme = theme;
        });
      };
      setTimeout(() => setTheme(appTheme, true));
      setTimeout(() => {
        matchDark.onchange = () => {
          setTheme(appTheme);
        };
      });
    </script>
    <script>
      const contentCache = {};
      const { createApp, onMounted, ref, shallowRef, computed } = Vue;
      const app = createApp({
        setup() {
          const leftDrawerOpen = ref(false);
          const menus = shallowRef([]),
            autoOpends = [];
          const ViewMD = {
            template: `<div v-once v-html='content' class='md-content'></div>`,
            // props: {
            //   content: String
            // },
            setup(props) {
              // onMounted(() => {
              //   // document
              //   //   .getElementById('app')
              //   //   .querySelectorAll('.md-content pre code')
              //   //   .forEach((block) => {
              //   //     hljs.highlightElement(block)
              //   //   })
              // });
              const content = contentCache[route.name];
              if (content) {
                delete contentCache[route.name];
              }

              return {
                content
              };
            }
          };
          const route = VueRouter.useRoute();
          const activeMenu = computed(() => route.name);
          const theme = ref(appTheme);

          const changeTheme = (which) => setTheme((theme.value = which));

          const open = (e) => {
            if (e.name === router.currentRoute.value.name) return;
            // console.log(e);
            router.replace({
              name: e.route || e.name
            });
          };

          onMounted(async () => {
            const res = await fetch('menus_en-US.json').then((res) => res.json());
            menus.value = res;

            const recursiveAddRoute = (menus) => {
              menus.forEach((e, i) => {
                if (!e.sub) {
                  router.addRoute({
                    name: e.route || e.name,
                    path: '/' + (e.route || e.url.replace(/\.txt$/, '')),
                    meta: {
                      url: e.url
                    },
                    component: ViewMD
                  });
                  return;
                }
                autoOpends.push(e.name);
                recursiveAddRoute(e.sub);
              });
            };
            recursiveAddRoute(menus.value);
            router.addRoute({
              path: '/',
              redirect: { name: 'start' }
            });
            loadingRoutes = null;
            router.replace(route.fullPath);
            console.log(menus, autoOpends, router.getRoutes(), route);
          });

          return {
            theme,
            changeTheme,
            leftDrawerOpen,
            activeMenu,
            menus,
            autoOpends,
            open,
            toggleLeftDrawer() {
              leftDrawerOpen.value = !leftDrawerOpen.value;
            }
          };
        }
      });
      const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes: []
      });
      let loadingRoutes = true;
      router.beforeEach(async (to, from) => {
        Quasar.LoadingBar.start();
        // console.log(to, from);
        const toRoute = to.matched[to.matched.length - 1];
        // 当未获取到路由配置时允许跳转不存在的地址，以免始终会重定向到 /start。当路由配置加载后会通过 replace 尝试导航到存在的路由
        if (to.fullPath !== '/' && !toRoute) return loadingRoutes;
        // 若加载过对应txt则不重复获取
        if (!toRoute || toRoute.meta.loaded) return;
        try {
          const res = await fetch('readme/' + to.meta.url).then((res) => res.text());
          // to.meta.content = toRoute.meta.content = res;
          contentCache[to.name] = res;
          to.meta.loaded = toRoute.meta.loaded = true;
        } catch (err) {
          console.error(err);
        }
      });
      router.afterEach((to) => {
        Quasar.LoadingBar.stop();
        // activeMenu.value = to.name;
        // console.log(to);
        // const matchedRoute = to.matched[to.matched.length - 1];
        // if (matchedRoute?.meta?.content) {
        //   matchedRoute.meta.content = undefined;
        // }
      });
      app.use(router);
      app.use(Quasar);
      app.mount('#app');
      // Quasar.Dark.set(appTheme === 'dark');
    </script>
  </body>
</html>
